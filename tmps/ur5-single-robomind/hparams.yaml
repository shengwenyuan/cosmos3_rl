# =============================================================================
# Cosmos3-Nano (MT-init) post-training on RoboMIND1 UR5, L20X bs32 reference
# Template — map key names to your own trainer's schema.
#
# DATASET / SCHEDULE BASIS
#   n_frames        : 2,965,157
#   n_episodes      : 22,044
#   chunk_length    : 32
#   n_windows       : n_frames - n_episodes * chunk_length = 2,259,749
#   L20X shape      : 8 GPUs * MAX_SAMPLES_PER_BATCH=32 -> effective global batch 256
#   target_epochs   : ~3.6 window passes to reduce cost vs DROID's ~4.9 raw-window exposure
#   max_iters       : 3.6 * 2,259,749 / 256 = 31,778 -> rounded to 32,000
#
# STILL VERIFY BEFORE LAUNCH
#   gripper.mode    : check the RoboMIND gripper field in your lerobot set:
#                        continuous width -> "continuous" (matches MT; preferred)
#                        binary open/close -> "binary"
# =============================================================================

init:
  from_checkpoint: cosmos3-nano-midtrain      # resume the MT checkpoint
  action_encoder: from_scratch                # fresh — MT has no joint head
  action_decoder_mlp: from_scratch
  action_embed_tokens: from_scratch
  precision: bf16

# ------------------------------------------------------------------ data / obs
data:
  fps: 15                                     # matches DROID -> recipe transfers as-is
  cameras: [overhead]                         # single view; this is what MT saw for UR
  image_hw: [360, 640]                        # raw overhead camera resolution in this LeRobot set
  canvas_hw: [540, 640]                       # DROID-style concat canvas; top real view + two black missing views
  image_augmentation: true                    # random img aug, per DROID recipe
  filter_idle_frames: true                    # use RoboMIND quality/idle labels
  filter_failed_demos: true                   # ditto
  action_norm: none                           # match DROID joint_pos code path: raw absolute joints, no action stats

# --------------------------------------------------------------- action space
action:
  type: absolute_joint_positions              # derive from state, NOT EEF, no IK
  arm_dof: 6                                   # UR5 is 6-DOF (NOT 7 like Franka)
  horizon: 32                                  # 32 steps @15fps ~ 2.13s (== DROID)
  target_source: state_future_joints          # joints at t+1..t+32 from lerobot state
  proprio: current_joints                     # current 6 joints (+gripper) as state

gripper:
  mode: continuous                            # <-- verify (see header)
  dim: 1

# ------------------------------------------------------------------ optimizer
optim:
  name: fused_adamw                           # follow mid-training
  base_lr: 2.5e-5                             # current UR5 wrapper default; strict linear scale for bs32 would be 6.25e-6
  action_lr_multiplier: 5.0                    # 5x on the fresh action params
  betas: [0.9, 0.95]
  weight_decay: 0.05
  grad_clip_norm: 1.0
  action_loss_scale: 10.0                      # MT scales action loss 10x
  per_rank_batch: 32                           # MAX_SAMPLES_PER_BATCH on each visible GPU
  world_size: 8
  global_batch: 256                            # 8 * 32
  grad_accum: 1                                # raise to 2 (eff 64) ONLY if loss is jumpy

# ------------------------------------------------------------------- schedule
schedule:
  lr_schedule: linear_decay
  warmup_steps: 1500                           # scaled to the large dataset
  # max_iters = target_epochs * n_windows / global_batch
  #   3.6 * 2,259,749 / 256 = 31,778 -> 32,000
  # Use the same value for scheduler.cycle_lengths / decay horizon.
  max_iters: 32000
  decay_to_step: 32000
  target_epochs: 3.6
  steps_per_epoch: 8827                         # 2,259,749 / 256

# ------------------------------------------------------ checkpoint / evaluation
eval:
  checkpoint_every: 4000
  eval_every: 4000                             # closed-loop; DON'T trust the loss curve
  start_eval_at: 8000
  keep_best_on: closed_loop_success
  # Match the eval overhead camera pose + intrinsics/FOV tightly to RoboMIND.
  # It's the only view -> any pose/intrinsic drift is pure OOD input.
  match_camera_to_training: true

# ------------------------------------------------------------------- inference
inference:
  diffusion_steps: 4                           # DROID inference config
  noise_shift: 5
  cfg_scale: 3
  cfg_parallel: true
  skip_video_latent_decode: true               # latency; not needed for control
  controller: joint_position                   # Franky-style, execute 32-step chunk
  control_hz: 15

# ------------------------------------------------------------------- auxiliary
aux:
  predict_video_frames: true                   # keep aux RGB output (world-action coupling)
